set_target:
  name: Set battery target
  description: Set the current target SoC intention for one or more batteries
  target:
    entity:
      integration: wattplan
    device:
      integration: wattplan
  fields:
    battery:
      name: Battery name
      description: Optional battery subentry name filter
      required: false
      example: batt01
      selector:
        text:
    soc_kwh:
      name: Target SoC (kWh)
      description: State of charge that should be reached
      required: true
      example: 12.5
      selector:
        number:
          min: 0
          max: 1000
          step: 0.1
          mode: box
    reach_at:
      name: Reach at
      description: Date and time when the SoC should be reached
      required: true
      example: "2026-02-25T22:30:00+00:00"
      selector:
        datetime:
    entry_id:
      name: Config entry ID
      description: Optional filter for one WattPlan setup
      required: false
      selector:
        text:

