export_planner_input:
  name: Export planner input
  description: Rebuild and return the exact planner model payload for one WattPlan setup
  response:
    optional: false
  fields:
    name:
      name: Setup name
      description: Optional filter for one WattPlan setup by name
      required: false
      selector:
        text:
    entry_id:
      name: Config entry ID
      description: Optional filter for one WattPlan setup
      required: false
      selector:
        text:
    as_json:
      name: Return JSON
      description: Return the planner model as a compact JSON string instead of structured service data
      required: false
      default: false
      selector:
        boolean:

