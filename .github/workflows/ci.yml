name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      UV_SYSTEM_PYTHON: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Keep the patch version aligned with the Home Assistant wheel
          # transitively pinned by pytest-homeassistant-custom-component.
          python-version: "3.14.3"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install '.[test]'

      - name: Run tests
        run: pytest
