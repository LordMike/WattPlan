name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build release artifact
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            VALIDATE_ARGS=(--validate-manifest-version "$VERSION")
            OUTPUT_NAME="wattplan.zip"
          else
            VERSION="$(python -c "import json, os; from pathlib import Path; manifest = json.loads(Path('src/custom_components/wattplan/manifest.json').read_text()); print(f\"{manifest['version']}-dev.{os.environ['GITHUB_SHA'][:7]}\")")"
            VALIDATE_ARGS=()
            OUTPUT_NAME="wattplan-$VERSION.zip"
          fi

          python scripts/build_hacs_zip.py \
            --output-name "$OUTPUT_NAME" \
            "${VALIDATE_ARGS[@]}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload release workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wattplan-release-${{ steps.version.outputs.version }}
          path: dist/*.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
